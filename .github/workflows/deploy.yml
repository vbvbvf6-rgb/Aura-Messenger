name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            | grep -q "^2" && echo "Deploy triggered ✅" || echo "Deploy trigger failed ❌"

      - name: Wait for deploy to start
        run: sleep 10

      - name: Done
        run: echo "New version ${{ github.sha }} deploying to Render 🚀"
